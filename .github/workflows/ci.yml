# Continuous integration for Invisibool.
#
# Required gates on every PR: build, test, clippy -D warnings, fmt --check,
# cargo deny, cargo audit, the leak harness, Criterion (informational
# numbers plus a regression tripwire), and gitleaks.
#
# Tool versions are pinned identically to Dockerfile.dev so CI and the
# local-Docker dev environment resolve to the same binaries. Each SHA-256
# is verified at runtime so an upstream re-tag cannot silently swap a
# binary. When bumping any pin, update Dockerfile.dev and this workflow
# in the same commit.
#
# Each gate is its own job so the GitHub PR status page reports them
# independently; CI minutes for parallel small jobs are cheap. The
# bench-regression and leak-harness jobs are real engine-level gates
# (Criterion+tripwire script and an integration-test canary harness
# respectively); the workflow_dispatch-only bench-baseline-regen job
# produces fresh Criterion baselines on the pinned runner class for
# the regression tripwire to compare against.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Manual trigger for the bench-baseline-regen job. The other jobs run
  # on every dispatch too (no harm; they're idempotent), but the regen
  # job's `if:` gate restricts it to the dispatch event so it doesn't
  # waste minutes on every PR.
  workflow_dispatch:

concurrency:
  # Cancel in-progress PR builds when new commits land; never cancel main.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ----- formatting --------------------------------------------------------
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ----- build + test ------------------------------------------------------
  check-test:
    name: cargo check + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace --all-targets

  # ----- clippy ------------------------------------------------------------
  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ----- cargo-deny --------------------------------------------------------
  deny:
    name: cargo deny check
    runs-on: ubuntu-24.04
    env:
      CARGO_DENY_VERSION: 0.19.8
      CARGO_DENY_SHA256: 70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install pinned cargo-deny
        run: |
          set -euo pipefail
          url="https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$url" -o /tmp/cargo-deny.tar.gz
          echo "${CARGO_DENY_SHA256}  /tmp/cargo-deny.tar.gz" | sha256sum -c -
          tar -xzf /tmp/cargo-deny.tar.gz -C /tmp
          install -m 0755 "/tmp/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny" /usr/local/bin/cargo-deny
          cargo-deny --version
      - run: cargo deny check

  # ----- cargo-audit -------------------------------------------------------
  #
  # On the M0a dep-free scaffold this job is STRUCTURAL: cargo-audit fetches
  # the RustSec advisory DB over the network and then has zero non-workspace
  # crates to audit, so it exits clean trivially. The CI slot exists now so
  # M0b/M1 (which bring in real deps) start auditing immediately with no
  # workflow change. Treat an empty-result first push as expected, not a
  # mystery success.
  audit:
    name: "cargo audit (M0a: dep-free, structural)"
    runs-on: ubuntu-24.04
    env:
      CARGO_AUDIT_VERSION: 0.22.2
      # Trust-on-first-use: rustsec publishes no .sha256 file alongside the
      # asset (see Dockerfile.dev annotation). Re-verify when bumping.
      CARGO_AUDIT_SHA256: 7fb9497f8594b389e5fce5ef9b92db08432996895b2e0c5a0167a69ed445c428
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: M0a context
        run: |
          cat <<'EOF'
          cargo audit on the M0a scaffold: the workspace has no third-party
          dependencies yet, so cargo-audit will fetch the RustSec advisory DB
          and then find nothing to scan. That clean exit is structural and
          expected. M0b adds the first real deps (aho-corasick, regex, fpe,
          aes-gcm, argon2, secrecy, zeroize, ...) and from that point on
          cargo audit becomes meaningful without any workflow change.

          Tool is networked (advisory DB clone over HTTPS); the engine and
          vault crate paths themselves remain network-free per the
          non-negotiables. cargo-audit only ever runs in CI/dev tooling.
          EOF
      - name: Install pinned cargo-audit
        run: |
          set -euo pipefail
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit/v${CARGO_AUDIT_VERSION}/cargo-audit-x86_64-unknown-linux-musl-v${CARGO_AUDIT_VERSION}.tgz"
          curl -fsSL "$url" -o /tmp/cargo-audit.tgz
          echo "${CARGO_AUDIT_SHA256}  /tmp/cargo-audit.tgz" | sha256sum -c -
          tar -xzf /tmp/cargo-audit.tgz -C /tmp
          install -m 0755 "/tmp/cargo-audit-x86_64-unknown-linux-musl-v${CARGO_AUDIT_VERSION}/cargo-audit" /usr/local/bin/cargo-audit
          cargo-audit --version
      - run: cargo audit

  # ----- gitleaks ----------------------------------------------------------
  gitleaks:
    name: gitleaks detect
    runs-on: ubuntu-24.04
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # gitleaks scans git history; the default shallow checkout would
          # only see the most recent commit. fetch-depth: 0 pulls full
          # history so leaks introduced in any prior commit are caught too.
          fetch-depth: 0
      - name: Install pinned gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - run: gitleaks detect --no-banner --redact --source .

  # ----- leak harness ------------------------------------------------------
  #
  # Runs the engine-level leak harness, an integration test that asserts
  # registered-value plaintext never appears in any output channel other
  # than the intended restore stream. Each test generates a fresh canary
  # at runtime (system clock + process id) - no canary string is ever
  # committed to the repo.
  #
  # The harness covers both the happy-path scrub families (FF1, PII,
  # card) and the three fail-closed branches that USED to be capable of
  # leaking before they were converted to redactions (Formatless,
  # FF1-eligibility-failure-at-scrub-time, non-16-digit card layout).
  # If a future engine change re-introduces a fail-open path, the
  # harness catches it on the next PR.
  #
  # `--nocapture` surfaces the per-test progress lines in the workflow
  # log; those lines deliberately never include canary plaintext.
  leak-harness:
    name: leak harness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test -p invisibool-engine --test leak_harness -- --nocapture

  # ----- Criterion bench regression ----------------------------------------
  #
  # Per-PR run of the engine scrub Criterion bench over the committed
  # corpus. Always prints the per-bench median in the workflow log
  # (informational). The pass/fail gate is RELATIVE-ONLY: the
  # bench-regression.py tripwire fails iff a tracked bench's measured
  # median exceeds `regression_factor` times the median committed in
  # bench-baseline.json. Absolute wall-clock thresholds would flake
  # under shared-runner noise.
  #
  # Bootstrap: while bench-baseline.json carries
  # `pending_first_ci_baseline: true`, the tripwire exits 0 and prints
  # informational numbers only. Run the bench-baseline-regen job below
  # to produce a real baseline once the bench is settled, then commit
  # the JSON it emits - the next PR will start enforcing the tripwire.
  bench-regression:
    name: bench regression
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run engine scrub benches
        # Short measurement keeps per-PR cost low; the regen job below
        # uses longer measurement when producing a baseline.
        run: cargo bench -p invisibool-engine --bench scrub -- --warm-up-time 2 --measurement-time 5
      - name: Check for regression vs. committed baseline
        run: ./scripts/bench-regression.py

  # ----- Criterion baseline refresh (manual only) --------------------------
  #
  # Producer for bench-baseline.json. Runs only on workflow_dispatch so
  # it never burns CI minutes on a PR. Uses longer measurement time than
  # the per-PR job to keep the baseline tight. Prints the new
  # bench-baseline.json to the workflow log inside BEGIN/END markers; a
  # maintainer copies the JSON into the repo per
  # docs/RUNBOOK_baseline_refresh.md. The job is read-only - it does not
  # commit to the repo on its own. This is intentional: a CI-signed
  # auto-commit to a baseline file is a quiet way to ratchet
  # performance regressions in unnoticed, so the maintainer reviews the
  # numbers in a PR before they take effect.
  bench-baseline-regen:
    name: bench baseline regen (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run engine scrub benches (long measurement for baseline)
        run: cargo bench -p invisibool-engine --bench scrub -- --warm-up-time 5 --measurement-time 15
      - name: Emit new baseline JSON
        run: ./scripts/bench-emit-baseline.py
