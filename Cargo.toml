[workspace]
resolver = "2"
members = [
    "crates/invisibool-engine",
    "crates/invisibool",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.78"
license = "Apache-2.0"
repository = "https://github.com/cybugX/invisibool"
authors = ["The Invisibool Authors"]

[workspace.dependencies]
invisibool-engine = { path = "crates/invisibool-engine", version = "=0.0.0" }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
