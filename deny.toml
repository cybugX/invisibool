# cargo-deny configuration for the Invisibool workspace.
#
# Enforced in CI. Policy:
#   - Minimal, audited dependency tree.
#   - No GPL/AGPL/LGPL - incompatible with Apache-2.0 distribution.
#   - Block known vulnerabilities (RUSTSEC advisories).
#   - Only crates.io as a registry; no git dependencies in release.

[graph]
all-features = false
no-default-features = false
# NOTE: `[graph].targets` is deliberately NOT set here. Investigated
# at chunk 18.5 when adding the first platform-specific dep (keyring's
# macOS Security framework binding). cargo-deny's `targets` is a
# FILTER applied to the host-resolved metadata graph: it can REMOVE
# crates that don't match a listed target, but it cannot ADD crates
# that the host's `cargo metadata` walk never visited. Since the
# macOS-only keyring binding (security-framework@3.7.0) is gated by
# `cfg(target_os = "macos")`, it does not appear in a Linux-host
# metadata resolution at all, so no `targets = [..., "x86_64-apple-darwin"]`
# value in this file makes deny inspect it. Cross-platform license
# coverage is instead provided by the CI deny job, which invokes
# `cargo deny --target <triple> check` once per shipped triple
# (Linux, macOS x86_64 + aarch64, Windows). See `.github/workflows/ci.yml`.

[output]
feature-depth = 1

# ---- Security advisories ----------------------------------------------------

[advisories]
version = 2
yanked = "deny"
ignore = []

# ---- License policy ---------------------------------------------------------
#
# Allowlist of permissive licenses compatible with Apache-2.0 distribution.
# Anything outside this list fails CI; if a needed crate uses a new permissive
# license, add it here in its own PR (with rationale in the commit message).

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
]
exceptions = []

# ---- Bans -------------------------------------------------------------------

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path deps within this workspace (e.g. invisibool depending on
# invisibool-engine by `path = "..."` without a version) are not wildcard
# deps in the publish sense; cargo-deny otherwise flags them.
allow-wildcard-paths = true
deny = []
skip = []
skip-tree = []

# Authoritative cross-path block on the keyring keyutils backend.
# Catches direct `keyring/linux-native` enables (in Cargo.toml or via
# `--features`), the two `linux-native-*-persistent` aliases that
# transitively enable it, AND any future feature alias that goes
# through `linux-native`. The build-time `compile_error!` in
# crates/invisibool-engine/src/keychain/os.rs catches only the
# `invisibool-engine/linux-native` passthrough path (Rust cfg cannot
# see transitive-crate features); this rule is the CI-enforced
# guarantee that fires regardless of how the feature was enabled.
# Rationale: keyutils collapses AccessDenied / KeyRevoked / KeyExpired
# into NoEntry, which would cause fetch_or_create to silently
# generate-and-overwrite the vault key on a locked or revoked entry,
# orphaning every secret in the existing vault.
[[bans.features]]
crate = "keyring"
deny = [
    "linux-native",
    "linux-native-sync-persistent",
    "linux-native-async-persistent",
]
reason = "keyring's keyutils backend collapses access-denied / revoked / expired into NoEntry; enabling it would let fetch_or_create silently generate-and-overwrite the vault key on a locked keychain. See crates/invisibool-engine/src/keychain/os.rs."

# ---- Source policy ----------------------------------------------------------

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
