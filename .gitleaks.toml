# gitleaks configuration for the Invisibool repo.
#
# A secrets-scrubber's repository is full of secret-shaped strings, so a
# broad allowlist would silently defang the scanner the project depends
# on. The allowlist below is deliberately narrow:
#
#   - Canary and test secrets are generated at runtime by the leak
#     harness and never committed, so they need no allowlist entry.
#   - Any unavoidable static fixtures live only under tests/fixtures/,
#     use clearly-invalid markers (e.g. sk-test-INVALID...), and are
#     covered by the path-scoped entry for that directory.
#   - rules/secrets.toml holds the detection regex source (not actual
#     secrets) and gets a single targeted path entry.
#
# Nothing else is allowlisted. Never repo-wide.

title = "Invisibool gitleaks configuration"

[extend]
useDefault = true

[allowlist]
description = """
Narrow allowlist: test fixtures under tests/fixtures/ and the regex \
source of the detection ruleset at rules/secrets.toml. Nothing else is \
exempted from gitleaks scanning.\
"""
paths = [
    '''tests/fixtures/.*''',
    '''rules/secrets\.toml''',
]
