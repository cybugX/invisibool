# gitleaks configuration for the Invisibool repo.
#
# Per build-prompt §4 (pre-decided, do not improvise):
#   - A secret scrubber's repo is full of secret-shaped strings; a broad
#     allowlist would quietly defang the scan, which is exactly what
#     gitleaks exists to prevent.
#   - Canary/test secrets are GENERATED AT RUNTIME by the leak harness
#     and never committed — so they need no allowlist entry at all.
#   - Any unavoidable static fixtures live ONLY under tests/fixtures/,
#     use clearly-invalid markers (sk-test-INVALID...), and get a
#     NARROWLY PATH-SCOPED allowlist covering exactly that directory.
#   - rules/secrets.toml (the detection ruleset itself, which contains
#     regex source — not actual secrets) gets a single targeted entry.
#   - Nothing else is allowlisted. Never repo-wide.

title = "Invisibool gitleaks configuration"

[extend]
useDefault = true

[allowlist]
description = """
Narrow allowlist (build-prompt §4): test fixtures under tests/fixtures/ \
and the regex source of the detection ruleset at rules/secrets.toml. \
Nothing else is exempted from gitleaks scanning.\
"""
paths = [
    '''tests/fixtures/.*''',
    '''rules/secrets\.toml''',
]
